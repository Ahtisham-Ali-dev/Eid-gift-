<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Mubarak 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(#0f2027, #203a43, #2c5364);
    overflow: hidden;
    text-align: center;
    color: white;
}

/* LOGIN */
.login {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #0f2027;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.login h1 {
    font-family: 'Great Vibes', cursive;
    color: gold;
    font-size: 42px;
}

/* Inputs */
.login input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin: 10px;
    width: 220px;
}

.login button {
    padding: 10px 20px;
    border: none;
    background: gold;
    border-radius: 8px;
    cursor: pointer;
}

/* Moon */
.moon {
    position: absolute;
    top: 50px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: #fdf6c9;
    border-radius: 50%;
    box-shadow: 0 0 30px #fff;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 20px #fff; }
    to { box-shadow: 0 0 50px #fff; }
}

/* Stars */
.star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

/* Title */
h1 {
    margin-top: 60px;
    font-size: 45px;
    font-family: 'Great Vibes', cursive;
    color: gold;
}

/* Gift */
.gift {
    margin: 100px auto;
    width: 140px;
    height: 140px;
    background: crimson;
    position: relative;
    border-radius: 10px;
    cursor: pointer;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* Lid */
.lid {
    width: 140px;
    height: 40px;
    background: darkred;
    position: absolute;
    top: -40px;
    border-radius: 10px;
    transition: 0.5s;
}

.ribbon {
    width: 20px;
    height: 140px;
    background: gold;
    position: absolute;
    left: 60px;
}

/* Open */
.open .lid {
    transform: rotate(-50deg) translateY(-50px);
}
p{
    font-style: italic;
    font-weight: 2em;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    color: lightgoldenrodyellow;
}

/* Message */
.message {
    display: none;
    font-style: italic;
    font-style: oblique;
    color: yellow;
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-size: 26px;
    margin-top: 20px;
}

/* Signature */
.signature {
    margin-top: 10px;
    font-family: 'Great Vibes', cursive;
    font-size: 24px;
    color: gold;
    opacity: 0;
    transition: 1s;
}

/* Mosque */
.mosque {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 150px;
    background: black;
    clip-path: polygon(0 100%,100% 100%,100% 60%,90% 70%,80% 50%,70% 70%,60% 55%,50% 75%,40% 55%,30% 70%,20% 50%,10% 70%,0 60%);
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* Particles */
.particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
/* FIRE FLAMES */
.fire {
    position: fixed;
    bottom: 0;
    width: 6px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    animation: fireUp 2s linear infinite;
    opacity: 0.8;
}

@keyframes fireUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-300px) scale(0.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
    <h1>🌙 Eid Mubarak ❤️</h1>
    <input type="text" id="username" placeholder="Your Name">
    <button onclick="start()">Enter</button>
</div>

<div class="moon"></div>

<h1>🌙 Eid Mubarak 🌙</h1>

<div class="gift" onclick="openGift(this)">
    <p>Open the gift</p>
    <div class="lid"></div>
    <div class="ribbon"></div>
</div>

<div class="message" id="msg"></div>

<div class="signature" id="sign">
    — By Muhammad Ahtisham Ali 💖
</div>

<div class="mosque"></div>

<audio id="audio" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b41f2.mp3"></audio>

<script>
// stars
for (let i = 0; i < 70; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(star);
}

// particles
for (let i = 0; i < 30; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(p);
}

// LOGIN
function start() {
    let name = document.getElementById("username").value;
    if(name === "") name = "Friend";

    window.userName = name;
    document.getElementById("login").style.display = "none";
}

// TYPE EFFECT
function typeText(text, element) {
    let i = 0;
    element.innerHTML = "";

    let interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

// OPEN GIFT
function openGift(box) {
    box.classList.add("open");

    let msg = document.getElementById("msg");
    msg.style.display = "block";

    let text = `🎉 Eid Mubarak ${window.userName} 🎉 
    \nMay Allah bless you with happiness, success & peace 🤍`;

    typeText(text, msg);

    document.getElementById("sign").style.opacity = 1;

    document.getElementById("audio").play();

    // CONFETTI
    for (let i = 0; i < 100; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = randomColor();
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
    }
}

// COLORS
function randomColor() {
    let colors = ["gold","red","blue","green","pink","orange"];
    return colors[Math.floor(Math.random() * colors.length)];
}
// 🔥 SIDE FIRE EFFECT
function createFireSide(side) {
    for (let i = 0; i < 20; i++) {
        let f = document.createElement("div");
        f.className = "fire";

        if (side === "left") {
            f.style.left = Math.random() * 10 + "vw";
        } else {
            f.style.right = Math.random() * 10 + "vw";
        }

        f.style.background = randomFireColor();
        f.style.animationDuration = (Math.random() * 2 + 1) + "s";

        document.body.appendChild(f);
    }
}

// fire colors
function randomFireColor() {
    let colors = ["orange","red","yellow"];
    return colors[Math.floor(Math.random() * colors.length)];
}

// run continuously
setInterval(() => {
    createFireSide("left");
    createFireSide("right");
}, 800);
// extra fire burst
for (let i = 0; i < 40; i++) {
    let f = document.createElement("div");
    f.className = "fire";
    f.style.left = Math.random() * 100 + "vw";
    f.style.background = randomFireColor();
    f.style.animationDuration = "1s";
    document.body.appendChild(f);
}
</script>

</body>
</html>
